services:
  app:
    build: .
    ports:
      - "5000"
    environment:
      # Propojení na DB kontejner přes název služby "db"
      - DATABASE_URL=postgresql://student:heslo123@db:5432/myapp
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - SECRET_KEY=napis_sem_nejaky_dlouhy_nahodny_retezec_123
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=student
      - POSTGRES_PASSWORD=heslo123
      - POSTGRES_DB=myapp
      # Přesměrování databáze do trvalého úložiště
      - PGDATA=/data/postgres
