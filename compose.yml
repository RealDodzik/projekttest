services:
  app:
    build: .
    ports:
      - "5000"
    environment:
      # Propojení na DB kontejner. Formát: postgresql://uzivatel:heslo@nazev_sluzby:port/nazev_db
      - DATABASE_URL=postgresql://student:heslo123@db:5432/myapp
      # AI klíče se doplní samy z platformy ITHOPE, ale pro jistotu je tu definujeme
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - SECRET_KEY=nejake_tvoje_tajne_heslo_pro_session
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=student
      - POSTGRES_PASSWORD=heslo123
      - POSTGRES_DB=myapp
    # --- TADY JE TA ZMĚNA ---
    volumes:
      - db_data:/var/lib/postgresql/data

# Definice svazku, který přežije redeploy
volumes:
  db_data:
