<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Filip Kuba - AI Extractor</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h1 { color: #1a73e8; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        #result { margin-top: 20px; white-space: pre-wrap; background: #f8f9fa; padding: 15px; border-left: 5px solid #1a73e8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Audio Extractor</h1>
        <p>Autor: Filip Kuba</p>
        <input type="file" id="audioFile" accept=".wav">
        <button id="btn" onclick="upload()">Analyzovat soubor</button>
        <div id="result">Výsledek se zobrazí zde...</div>
    </div>

    <script>
        async function upload() {
            const fileInput = document.getElementById('audioFile');
            const resDiv = document.getElementById('result');
            const btn = document.getElementById('btn');
            
            if (!fileInput.files[0]) return alert("Vyber .wav soubor!");

            btn.disabled = true;
            resDiv.innerText = "Probíhá analýza... (může to trvat až 30s)";

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('http://localhost:8081/ai', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                resDiv.innerText = "TEXT Z AUDIA:\n" + data.original_text + "\n\nAI SHRNUTÍ:\n" + data.ai_shrnuti;
            } catch (err) {
                resDiv.innerText = "Chyba: Nepodařilo se spojit s Dockerem. Zkontroluj, zda běží.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
