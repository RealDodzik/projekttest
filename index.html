<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filip Kuba - Media AI Extractor</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* White mode - Oranžová */
            --bg-color: #fcf6f0;
            --card-bg: #ffffff;
            --text-main: #2d2d2d;
            --text-sub: #666666;
            --accent-color: #e67e22; /* Tmavší oranžová */
            --accent-hover: #d35400;
            --border-color: #eee;
            --result-bg: #fffbf2;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            /* Dark mode - Fialová */
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-main: #e9ecef;
            --text-sub: #a2a8d3;
            --accent-color: #7209b7; /* Fialová */
            --accent-hover: #560bad;
            --border-color: #24344d;
            --result-bg: #0f172a;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color); 
            color: var(--text-main);
            transition: var(--transition);
        }

        /* Dark/Light Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: var(--transition);
        }
        .theme-toggle:hover { transform: scale(1.05); }

        .container { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            width: 90%;
            max-width: 650px; 
            text-align: center;
            transition: var(--transition);
        }

        h1 { 
            color: var(--accent-color); 
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 2.2em;
        }

        .author { color: var(--text-sub); margin-bottom: 30px; font-weight: 600; }

        .upload-section { 
            border: 2px dashed var(--accent-color); 
            padding: 30px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            background: rgba(var(--accent-color), 0.05);
        }

        input[type="file"] { 
            margin-bottom: 20px; 
            color: var(--text-main);
            width: 100%;
        }

        button#btn { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 18px 30px; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1.2em; /* Větší text v tlačítku */
            width: 100%; 
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        button#btn:hover { 
            background: var(--accent-hover); 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        button#btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        #result { 
            display: none; 
            margin-top: 30px; 
            padding: 25px; 
            background: var(--result-bg); 
            border-radius: 18px; 
            border: 1px solid var(--border-color);
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .label { 
            font-weight: 700; 
            color: var(--accent-color); 
            text-transform: uppercase; 
            font-size: 0.85em; 
            letter-spacing: 1px;
            margin-bottom: 8px; 
            display: block; 
        }

        .content-box { margin-bottom: 20px; line-height: 1.6; }
        
        .loader { 
            display: none; 
            margin: 20px auto; 
            width: 30px; height: 30px; 
            border: 4px solid var(--border-color); 
            border-top: 4px solid var(--accent-color); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="light">

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>

    <div class="container">
        <h1>Media AI Extractor</h1>
        <p class="author">By Filip Kuba</p>
        
        <div class="upload-section">
            <input type="file" id="mediaFile" accept=".wav,.mp3,.mp4,.avi,.mov,.mkv">
            <button id="btn" onclick="upload()">Analyzovat soubor</button>
            <div id="loader" class="loader"></div>
            <p id="loadingText" style="display:none; color: var(--accent-color); font-weight: 600;">AI přemýšlí...</p>
        </div>

        <div id="result">
            <span class="label">Média</span>
            <div id="m_type" class="content-box" style="font-weight: 600;"></div>

            <span class="label">Přepis textu</span>
            <div id="o_text" class="content-box"></div>

            <span class="label">AI Insight</span>
            <div id="ai_res" class="content-box" style="background: rgba(0,0,0,0.03); padding: 15px; border-radius: 12px; border-left: 4px solid var(--accent-color);"></div>
        </div>
    </div>

    <script>
        // Přepínání Dark/Light modu
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                btn.innerText = "☀️ Light Mode";
            } else {
                body.setAttribute('data-theme', 'light');
                btn.innerText = "🌙 Dark Mode";
            }
        }

        async function upload() {
            const fileInput = document.getElementById('mediaFile');
            const resDiv = document.getElementById('result');
            const loader = document.getElementById('loader');
            const loadText = document.getElementById('loadingText');
            const btn = document.getElementById('btn');
            
            if (!fileInput.files[0]) return alert("Nejdřív vyber soubor!");

            btn.disabled = true;
            loader.style.display = 'block';
            loadText.style.display = 'block';
            resDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('/ai', { method: 'POST', body: formData });
                const data = await response.json();

                document.getElementById('m_type').innerText = "📁 " + data.media_type;
                document.getElementById('o_text').innerText = data.original_text || "Text nebyl nalezen.";
                document.getElementById('ai_res').innerText = data.ai_analysis;
                
                resDiv.style.display = 'block';
            } catch (err) {
                alert("Chyba spojení.");
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
                loadText.style.display = 'none';
            }
        }
    </script>
</body>
</html>
